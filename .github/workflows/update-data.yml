name: Update ABS Challenge Data

on:
  schedule:
    # Every hour from noon to midnight Pacific (UTC-7 during PDT)
    # Noon PT = 19:00 UTC, Midnight PT = 07:00 UTC next day
    - cron: '0 19,20,21,22,23,0,1,2,3,4,5,6,7 * 3-10 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: data/requirements.txt

      - name: Install dependencies
        run: pip install -r data/requirements.txt

      - name: Fetch ABS challenge data
        run: python data/fetch_abs_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ABS challenge data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
